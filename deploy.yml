---
- name: Deploy Laravel tek_chansetha
  hosts: all
  become: true
  vars:
    deploy_path: /var/www/html/tek_chansetha

  tasks:
    - name: Sync files to server
      synchronize:
        src: "{{ playbook_dir }}/"
        dest: "{{ deploy_path }}"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=.env"
          - "--delete"

    - name: Set ownership
      file:
        path: "{{ deploy_path }}"
        owner: www-data
        group: www-data
        recurse: true

    - name: Set storage permissions
      file:
        path: "{{ item }}"
        mode: '0775'
        recurse: true
      loop:
        - "{{ deploy_path }}/storage"
        - "{{ deploy_path }}/bootstrap/cache"

    - name: Run artisan commands
      shell: |
        cd {{ deploy_path }}
        php artisan migrate --force
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache
      become_user: www-data

    - name: Restart Apache
      service:
        name: apache2
        state: restarted